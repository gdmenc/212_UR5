services:
  dual_ur5_sim:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: dual_ur5_sim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      DISPLAY: ":1"
      SCENE_CONFIG: /workspace/ros_ws/src/dual_ur5_gazebo/config/scene.yaml
    ports:
      - "6080:6080"
    command: ["/bin/bash", "-lc", "/workspace/docker/run_sim.sh"]
